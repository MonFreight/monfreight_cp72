<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Freight - CP72 Customs Declaration</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #073a45;
            --navy-2: #052b34;
            --blue: #008fb0;
            --blue-deep: #0a6f86;
            --sky: #e4f4f8;
            --amber: #f6a821;
            --amber-dark: #dd8e08;
            --ink: #0f2229;
            --body-c: #41535c;
            --line: #e6edf1;
            --bg-soft: #f4f9fb;
            --radius: 14px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: "Plus Jakarta Sans", Inter, Arial, sans-serif;
            background:
                radial-gradient(900px 380px at 100% 0%, rgba(0,143,176,.08), transparent 60%),
                var(--bg-soft);
            color: var(--body-c);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 850px;
            background: #fff;
            margin: 48px auto;
            padding: 38px 34px 34px;
            border-radius: 22px;
            border: 1px solid var(--line);
            box-shadow: 0 14px 40px rgba(7,58,69,.10);
        }

        h2 {
            text-align: center;
            margin: 6px 0 24px;
            color: var(--navy);
            font-size: 1.45rem;
            letter-spacing: -.02em;
        }

        .logo-box { text-align: center; margin-bottom: 12px; }
        .logo-box img { width: 190px; }

        label {
            font-weight: 600;
            color: var(--ink);
            margin-top: 16px;
            display: block;
            font-size: 14.5px;
        }

        input, textarea {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            margin-top: 6px;
            font-size: 15px;
            font-family: inherit;
            color: var(--ink);
            background: #fff;
            transition: border-color .2s, box-shadow .2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,143,176,.14);
        }

        input[readonly] { background: var(--bg-soft); color: var(--blue-deep); font-weight: 600; }

        textarea { resize: vertical; min-height: 74px; }

        .section-title {
            background: linear-gradient(120deg, var(--navy), var(--blue-deep));
            color: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            margin-top: 30px;
            font-size: 13.5px;
            font-weight: 700;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid var(--line);
            padding: 8px;
            font-size: 14px;
        }
        th {
            background: var(--sky);
            color: var(--navy);
            font-weight: 700;
        }
        td input { margin-top: 0; padding: 8px 10px; }

        .btn {
            background: var(--navy);
            color: #fff;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 13.5px;
            font-weight: 600;
            font-family: inherit;
            transition: background .2s, transform .15s;
        }

        .btn:hover { background: var(--blue-deep); transform: translateY(-1px); }

        button[type="submit"].btn {
            background: var(--amber);
            color: var(--navy-2);
            font-size: 16px;
            font-weight: 800;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 12px 28px rgba(246,168,33,.36);
        }

        button[type="submit"].btn:hover { background: var(--amber-dark); transform: translateY(-2px); }

        .choice-wrapper { margin: 14px 0 10px; }

        .choice-wrapper label {
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 6px 18px 6px 0;
            font-size: 15px;
            color: var(--body-c);
        }

        .choice-wrapper input[type="radio"] {
            width: auto;
            margin: 0;
            accent-color: var(--blue);
        }

        .signature-box {
            border: 2px dashed var(--line);
            background: var(--bg-soft);
            width: 100%;
            height: 160px;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
        }

        @media (max-width: 640px) {
            .container { margin: 0; border-radius: 0; padding: 26px 18px; }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo-box">
        <img src="/static/monfreight_logo.png" alt="Mon Freight Logo">
    </div>

    <h2>CP72 Customs Declaration Form / Монгол хэлээр бөглөнө үү! </h2>

    <form action="/submit_cp72" method="POST" onsubmit="submitSignature()">

        <!-- Sender Details -->
        <div class="section-title">Sender Details</div>

        <label>Full Name / Овог, нэр:</label>
        <input type="text" name="sender" required>

        <label>Address / Хаяг:</label>
        <textarea name="senderAddress" required></textarea>

        <label>Phone Number / Утасны дугаар:</label>
        <input type="text" name="senderPhone" required>

        <!-- Box Number -->
        <label for="boxNumber">Box Number / Ачааны дугаар: / Дугаар аваагүй бол цэг оруулна!/</label>
        <input type="text" id="boxNumber" name="boxNumber" required>

        <!-- Recipient Details -->
        <div class="section-title">Recipient Details</div>

        <label>Full Name / Овог, нэр:</label>
        <input type="text" name="recipient" required>

        <label>Address / Хаяг:</label>
        <textarea name="recipientAddress" required></textarea>

        <label>Phone Number /  Утасны дугаар:</label>
        <input type="text" name="recipientPhone" required>

        <!-- Goods Table -->
        <div class="section-title">Goods Description</div>

        <table id="goodsTable">
            <tr>
                <th>#</th>
                <th>Description</th>
                <th>Qty</th>
                <th>Weight (kg)</th>
                <th>Origin</th>
                <th>Value (AUD)</th>
                <th>Action</th>
            </tr>

            <tr>
                <td>1</td>
                <td><input type="text" name="item_description[]"></td>
                <td><input type="number" name="item_quantity[]" min="1"></td>
                <td><input type="number" step="0.01" name="item_weight[]"></td>
                <td><input type="text" name="item_origin[]"></td>
                <td><input type="number" step="0.01" name="item_value[]" oninput="updateDeclaredValue()"></td>
                <td><button type="button" class="btn" onclick="deleteRow(this)">Delete</button></td>
            </tr>
        </table>

        <button type="button" class="btn" onclick="addRow()">+ Add Row</button>

        <!-- Weight Section -->
        <div class="section-title">Weight & Measurement</div>

        <label>Actual Weight (kg):</label>
        <input type="number" step="0.01" name="weight" id="weight" required oninput="calcVolume()">

        <label>Length (cm):</label>
        <input type="number" step="0.01" name="length" id="length" required oninput="calcVolume()">

        <label>Width (cm):</label>
        <input type="number" step="0.01" name="width" id="width" required oninput="calcVolume()">

        <label>Height (cm):</label>
        <input type="number" step="0.01" name="height" id="height" required oninput="calcVolume()">

        <label>Volumetric Weight (kg):</label>
        <input type="text" id="volumetricWeight" name="volumetricWeight" readonly>

        <label>Chargeable Weight (kg):</label>
        <input type="text" id="finalWeight" name="finalWeight" readonly>

        <!-- Declared Value -->
        <label><strong>Declared Total Value (AUD):</strong></label>
        <input type="number" name="value" id="declaredValue" required>

        <!-- Delivery Option -->
        <div class="section-title">Delivery Option</div>

        <div class="choice-wrapper">
            <label><input type="radio" name="deliveryOption" value="📦 Warehouse Pickup" required> 📦 Warehouse Pickup / Агуулахаас авах</label>
            <label><input type="radio" name="deliveryOption" value="🚚 Delivery to Address" required> 🚚 Delivery to Address / Хаягаар хүргүүлэх</label>
            <label><input type="radio" name="deliveryOption" value="📮 Closest Parcel Box" required> 📮 Closest Parcel Box / Хайрцагт байршуулах</label>
        </div>

        <!-- Copy Email -->
        <div class="section-title">Send Customer Copy?</div>

        <div class="choice-wrapper">
            <label><input type="radio" name="sendCopy" value="no" checked onclick="toggleCustomerEmail(false)"> No</label>
            <label><input type="radio" name="sendCopy" value="yes" onclick="toggleCustomerEmail(true)"> Yes</label>
        </div>

        <div id="customerEmailBox" style="display:none;">
            <label>Your Email:</label>
            <input type="email" name="customerEmail">
        </div>

        <!-- Signature -->
        <div class="section-title">Signature</div>

        <canvas id="signaturePad" class="signature-box"></canvas>
        <button type="button" class="btn" onclick="clearSignature()">Clear Signature</button>
        <input type="hidden" id="signatureData" name="signatureData">

        <button type="submit" class="btn" style="width:100%; margin-top:25px;">Submit CP72</button>

    </form>
</div>

<script>
/* ------------------ ADD & DELETE ROW ------------------ */
function addRow() {
    const table = document.getElementById("goodsTable");
    const index = table.rows.length; // header is row 0

    const row = table.insertRow(-1);
    row.innerHTML = `
        <td>${index}</td>
        <td><input type="text" name="item_description[]"></td>
        <td><input type="number" name="item_quantity[]" min="1"></td>
        <td><input type="number" step="0.01" name="item_weight[]"></td>
        <td><input type="text" name="item_origin[]"></td>
        <td><input type="number" step="0.01" name="item_value[]" oninput="updateDeclaredValue()"></td>
        <td><button type="button" class="btn" onclick="deleteRow(this)">Delete</button></td>
    `;
}

function deleteRow(btn) {
    const row = btn.parentNode.parentNode;
    row.parentNode.removeChild(row);
    updateDeclaredValue();
}

/* ------------------ AUTO TOTAL VALUE ------------------ */
function updateDeclaredValue() {
    let total = 0;
    document.querySelectorAll("input[name='item_value[]']").forEach(v => {
        total += parseFloat(v.value) || 0;
    });
    document.getElementById("declaredValue").value = total.toFixed(2);
}

/* ------------------ VOLUMETRIC WEIGHT ------------------ */
function calcVolume() {
    let L = parseFloat(document.getElementById("length").value) || 0;
    let W = parseFloat(document.getElementById("width").value) || 0;
    let H = parseFloat(document.getElementById("height").value) || 0;
    let weight = parseFloat(document.getElementById("weight").value) || 0;

    let vol = (L * W * H) / 6000;
    document.getElementById("volumetricWeight").value = vol.toFixed(2);
    document.getElementById("finalWeight").value = Math.max(weight, vol).toFixed(2);
}

/* ------------------ CUSTOMER EMAIL TOGGLE ------------------ */
function toggleCustomerEmail(show) {
    document.getElementById("customerEmailBox").style.display = show ? "block" : "none";
}

/* ------------------ RETINA-SAFE SIGNATURE PAD ------------------ */
const canvas = document.getElementById("signaturePad");
const ctx = canvas.getContext("2d");
let drawing = false;

function resizeCanvasForRetina() {
    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();

    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;

    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
}

function getCanvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    let clientX, clientY;

    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }

    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

canvas.addEventListener("mousedown", e => {
    drawing = true;
    const pos = getCanvasPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    const pos = getCanvasPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
});

canvas.addEventListener("mouseup", () => { drawing = false; });
canvas.addEventListener("mouseleave", () => { drawing = false; });

// Touch support
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    drawing = true;
    const pos = getCanvasPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!drawing) return;
    const pos = getCanvasPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
});

canvas.addEventListener("touchend", () => { drawing = false; });

function clearSignature() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function submitSignature() {
    document.getElementById("signatureData").value = canvas.toDataURL();
}

window.addEventListener("load", resizeCanvasForRetina);
window.addEventListener("resize", resizeCanvasForRetina);


window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("success") === "true") {
        alert("📦 Your CP72 form has been sent to Mon Freight successfully!");
    }
};


</script>

</body>
</html>
